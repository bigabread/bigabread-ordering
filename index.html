</head>
<body>

<h1>Big A Bread Online Ordering</h1>

<label>Name:</label><br> <input type="text" id="customerName"><br><br>

<label>Phone:</label><br> <input type="text" id="customerPhone"><br><br>

<label>Order Type:</label><br> <select id="orderType"> <option value="PICKUP">Pickup</option> <option value="DELIVERY">Delivery</option> </select>

<h2>Products</h2>

<div id="products"></div>

<h3>Total: $<span id="total">0.00</span></h3>

<button onclick="submitOrder()">Place Order</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDJh97eKRt_p7HE84pctGp8METGhC2PJZQ",
  authDomain: "bigabread-a8255.firebaseapp.com",
  projectId: "bigabread-a8255",
  storageBucket: "bigabread-a8255.firebasestorage.app",
  messagingSenderId: "123358843211",
  appId: "1:123358843211:web:0a4cdf04aa25bd2b6498ce"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let products = [];

db.collection("products").get()
.then(snapshot => {

    const container = document.getElementById("products");

    snapshot.forEach(doc => {

        const p = doc.data();

        products.push({
            id: p.recipeId,
            name: p.name,
            price: Number(p.price)
        });

        container.innerHTML += `
            <div style="margin-bottom:10px;">
                <b>${p.name}</b> - $${p.price}
                <input
                    type="number"
                    id="qty_${p.recipeId}"
                    value="0"
                    min="0"
                    onchange="updateTotal()">
            </div>
        `;
    });
})
.catch(error => {
    console.error(error);
    alert("Failed to load products.");
});

function updateTotal() {

    let total = 0;

    products.forEach(p => {

        const element =
            document.getElementById(
                "qty_" + p.id
            );

        if (!element) return;

        const qty =
            parseFloat(
                element.value
            ) || 0;

        total += qty * Number(p.price);
    });

    document.getElementById("total")
        .innerText = total.toFixed(2);
}

function submitOrder() {

    const customerName =
        document.getElementById(
            "customerName"
        ).value.trim();

    const customerPhone =
        document.getElementById(
            "customerPhone"
        ).value.trim();

    if (customerName === "") {
        alert("Please enter your name.");
        return;
    }

    const items = [];

    let total = 0;

    products.forEach(p => {

        const element =
            document.getElementById(
                "qty_" + p.id
            );

        if (!element) return;

        const qty =
            parseFloat(
                element.value
            ) || 0;

        if (qty > 0) {

            items.push({
                recipeId: p.id,
                recipeName: p.name,
                quantity: qty,
                unitPrice: Number(p.price)
            });

            total += qty * Number(p.price);
        }
    });

    if (items.length === 0) {
        alert("Please select at least one item.");
        return;
    }

    console.log("Submitting Order");
    console.log(items);
    console.log(total);

  db.collection("products").get()
.then(snapshot => {

    const container = document.getElementById("products");

    snapshot.forEach(doc => {

        const p = doc.data();
        
        // FIX: Use doc.id to ensure a guaranteed unique identifier 
        // fallback to p.recipeId or p.id if you specifically mapped it that way
        const productId = doc.id || p.recipeId || p.id; 

        products.push({
            id: productId,
            name: p.name,
            price: Number(p.price)
        });

        container.innerHTML += 
            <div style="margin-bottom:10px;">
                <b>${p.name}</b> - $${Number(p.price).toFixed(2)}
                <input
                    type="number"
                    id="qty_${productId}"
                    value="0"
                    min="0"
                    onchange="updateTotal()">
            </div>
        ;
    });
})
.catch(error => {
    console.error(error);
    alert("Failed to load products.");
});
